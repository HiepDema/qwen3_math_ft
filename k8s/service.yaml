apiVersion: v1
kind: Service
metadata:
  name: math-reasoning-api
  namespace: math-reasoning
  labels:
    app: math-reasoning-api
spec:
  type: NodePort
  selector:
    app: math-reasoning-api
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      nodePort: 30080
      protocol: TCP
