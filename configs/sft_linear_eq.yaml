# SFT Configuration for Qwen3-0.6B Linear Equation Solving
# Uses Unsloth for efficient LoRA training

model:
  name: "Qwen/Qwen3-0.6B"
  cpt_checkpoint: "outputs/cpt_linear_eq/final"
  load_in_4bit: true
  max_seq_length: 1024

lora:
  r: 32
  lora_alpha: 64
  lora_dropout: 0.05
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"

dataset:
  path: "data/raw/sft_linear_equations.jsonl"
  num_samples: 150
  test_size: 0.1

  system_prompt: "Bạn là trợ lý toán học. Hãy giải phương trình bậc nhất theo từng bước."

training:
  output_dir: "outputs/sft_linear_eq"
  num_train_epochs: 5
  per_device_train_batch_size: 4
  per_device_eval_batch_size: 4
  gradient_accumulation_steps: 4
  learning_rate: 1.0e-4
  weight_decay: 0.01
  warmup_ratio: 0.1
  lr_scheduler_type: "cosine"
  bf16: true
  logging_steps: 5
  save_steps: 50
  save_total_limit: 2
  eval_steps: 25
  eval_strategy: "steps"
  load_best_model_at_end: true
  metric_for_best_model: "eval_loss"
  packing: false
  optim: "adamw_8bit"
  seed: 42
