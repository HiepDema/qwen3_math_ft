# Model Optimization Configuration

quantization:
  method: "awq"  # awq, gptq, gguf
  bits: 4
  group_size: 128
  input_model: "outputs/sft/final"
  output_dir: "outputs/optimized"

  # GGUF export for llama.cpp
  gguf:
    enabled: true
    quantization_types: ["Q4_K_M", "Q5_K_M", "Q8_0"]

serving:
  engine: "vllm"
  model_path: "outputs/optimized"
  host: "0.0.0.0"
  port: 8000
  max_model_len: 4096
  gpu_memory_utilization: 0.85
  tensor_parallel_size: 1
  dtype: "auto"
  enforce_eager: false  # Use CUDA graphs

  # vLLM specific optimizations
  enable_prefix_caching: true
  max_num_batched_tokens: 8192
  max_num_seqs: 64

profiling:
  enabled: true
  output_dir: "outputs/profiling"
  metrics:
    - throughput_tokens_per_sec
    - latency_p50_ms
    - latency_p99_ms
    - gpu_memory_peak_mb
    - time_to_first_token_ms
