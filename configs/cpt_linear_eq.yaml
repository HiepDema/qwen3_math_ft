# CPT Configuration for Qwen3-0.6B Linear Equation Solving
# Uses Unsloth for efficient LoRA training

model:
  name: "Qwen/Qwen3-0.6B"
  load_in_4bit: true
  max_seq_length: 1024

lora:
  r: 32
  lora_alpha: 64
  lora_dropout: 0.05
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"

dataset:
  path: "data/raw/cpt_linear_equations.jsonl"
  text_field: "text"
  num_samples: 150

training:
  output_dir: "outputs/cpt_linear_eq"
  num_train_epochs: 3
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 4
  learning_rate: 2.0e-4
  weight_decay: 0.01
  warmup_ratio: 0.05
  lr_scheduler_type: "cosine"
  bf16: true
  logging_steps: 5
  save_steps: 50
  save_total_limit: 2
  packing: true
  optim: "adamw_8bit"
  seed: 42
