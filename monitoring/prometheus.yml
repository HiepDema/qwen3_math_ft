global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "math-reasoning-api"
    static_configs:
      - targets: ["math-api:8000"]
    metrics_path: /metrics
    scrape_interval: 10s

  - job_name: "math-reasoning-api-host"
    static_configs:
      - targets: ["host.docker.internal:8000"]
    metrics_path: /metrics
    scrape_interval: 10s
