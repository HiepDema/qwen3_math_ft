name: LSReasoning Experiment Pipeline

on:
  workflow_dispatch:
    inputs:
      experiments:
        description: "Which experiments to run"
        required: true
        type: choice
        options:
          - all
          - cpt-sft-only
          - sft-only
          - grpo-only
          - eval-only
      grpo_max_prompts:
        description: "Max prompts for GRPO (default 3000)"
        required: false
        default: "3000"
      num_eval:
        description: "Number of test samples for evaluation"
        required: false
        default: "500"
  push:
    branches: [main]
    paths:
      - 'scripts/train_*_lsreasoning*.py'
      - 'scripts/evaluate_lsreasoning*.py'
      - 'scripts/run_experiment_lsreasoning.py'

env:
  WANDB_API_KEY: ${{ secrets.WANDB_API_KEY }}
  WANDB_PROJECT: lsreasoning-sft-vs-grpo
  HF_TOKEN: ${{ secrets.HF_TOKEN }}

jobs:
  # ============================================================
  # Job 1: Lint & validate scripts
  # ============================================================
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Syntax check all experiment scripts
        run: |
          python -c "
          import ast, sys
          from pathlib import Path
          scripts = list(Path('scripts').glob('*lsreasoning*.py'))
          scripts += [Path('scripts/inference_optimized.py')]
          errors = []
          for f in scripts:
              try:
                  ast.parse(f.read_text())
              except SyntaxError as e:
                  errors.append(f'{f}: {e}')
          if errors:
              print('Syntax errors found:')
              for e in errors:
                  print(f'  {e}')
              sys.exit(1)
          print(f'All {len(scripts)} scripts OK')
          "

      - name: Validate reward functions (unit test)
        run: |
          python -c "
          import sys
          sys.path.insert(0, 'scripts')
          from train_grpo_lsreasoning_v2 import (
              reward_correctness, reward_numeric_proximity,
              reward_format, compute_dense_reward, compute_sparse_reward
          )
          # Test correctness
          assert reward_correctness('Answer: 42', '42') == 1.0
          assert reward_correctness('Answer: 43', '42') == 0.0
          assert reward_correctness('No number here', '42') == 0.0

          # Test proximity
          assert reward_numeric_proximity('Answer: 42', '42') == 1.0
          assert reward_numeric_proximity('Answer: 41', '42') > 0.9

          # Test format
          assert reward_format('Step 1\nStep 2\nStep 3\nAnswer: 5') > 0.5

          # Test dense vs sparse
          r_dense = compute_dense_reward('Step 1\nAnswer: 42', '42', 'add numbers')
          r_sparse = compute_sparse_reward('Step 1\nAnswer: 42', '42', 'add numbers')
          assert r_dense > 0
          assert r_sparse == 1.0

          print('All reward function tests passed!')
          "

  # ============================================================
  # Job 2: Data preparation
  # ============================================================
  prepare-data:
    runs-on: ubuntu-latest
    needs: validate
    outputs:
      train_count: ${{ steps.split.outputs.train_count }}
      test_count: ${{ steps.split.outputs.test_count }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install datasets huggingface_hub

      - name: Prepare 80/20 split
        id: split
        run: |
          python -c "
          import json
          from pathlib import Path
          from datasets import load_dataset

          DATA_DIR = Path('data/lsreasoning_split')
          DATA_DIR.mkdir(parents=True, exist_ok=True)

          dataset = load_dataset('DataMuncher-Labs/LSReasoning-15000', split='train')
          split = dataset.train_test_split(test_size=0.2, seed=42)

          for name, data in [('train', split['train']), ('test', split['test'])]:
              path = DATA_DIR / f'{name}.jsonl'
              with open(path, 'w') as f:
                  for item in data:
                      f.write(json.dumps(item, ensure_ascii=False) + '\n')
              print(f'{name}: {len(data)} samples -> {path}')

          print(f'::set-output name=train_count::{len(split[\"train\"])}')
          print(f'::set-output name=test_count::{len(split[\"test\"])}')
          "

      - name: Upload data split
        uses: actions/upload-artifact@v4
        with:
          name: lsreasoning-data-split
          path: data/lsreasoning_split/

  # ============================================================
  # Job 3: Training (GPU required)
  # ============================================================
  train:
    runs-on: [self-hosted, gpu]
    needs: prepare-data
    timeout-minutes: 480
    steps:
      - uses: actions/checkout@v4

      - name: Download data split
        uses: actions/download-artifact@v4
        with:
          name: lsreasoning-data-split
          path: data/lsreasoning_split/

      - name: Install dependencies
        run: |
          pip install torch --index-url https://download.pytorch.org/whl/cu121
          pip install -r requirements_finetune.txt

      - name: GPU Info
        run: nvidia-smi

      - name: Run experiments
        run: |
          SKIP_FLAGS=""
          if [ "${{ inputs.experiments }}" = "sft-only" ]; then
            SKIP_FLAGS="--skip-cpt --skip-grpo-dense --skip-grpo-sparse"
          elif [ "${{ inputs.experiments }}" = "cpt-sft-only" ]; then
            SKIP_FLAGS="--skip-sft --skip-grpo-dense --skip-grpo-sparse"
          elif [ "${{ inputs.experiments }}" = "grpo-only" ]; then
            SKIP_FLAGS="--skip-cpt --skip-sft"
          elif [ "${{ inputs.experiments }}" = "eval-only" ]; then
            SKIP_FLAGS="--skip-cpt --skip-sft --skip-grpo-dense --skip-grpo-sparse"
          fi

          python scripts/run_experiment_lsreasoning.py \
            --grpo-max-prompts ${{ inputs.grpo_max_prompts || '3000' }} \
            --num-eval ${{ inputs.num_eval || '500' }} \
            $SKIP_FLAGS

      - name: Run inference benchmark
        run: |
          python scripts/inference_optimized.py \
            --model-path outputs/grpo_lsreasoning_dense/final \
            --num-samples 50 \
            --benchmark \
            --output-file outputs/benchmark_results.json

      - name: Upload training outputs
        uses: actions/upload-artifact@v4
        with:
          name: experiment-outputs
          path: |
            outputs/experiment_results.json
            outputs/benchmark_results.json
            outputs/*/final/adapter_config.json
            outputs/*/final/adapter_model.safetensors

      - name: Comment results on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const results = JSON.parse(fs.readFileSync('outputs/experiment_results.json', 'utf8'));

            let table = '| Method | Exact Match | Close Match | Format | Reasoning |\n';
            table += '|--------|-------------|-------------|--------|----------|\n';
            for (const [method, res] of Object.entries(results)) {
              table += `| ${method} | ${(res.exact_match * 100).toFixed(1)}% | ${(res.close_match * 100).toFixed(1)}% | ${(res.format_score * 100).toFixed(1)}% | ${(res.reasoning_score * 100).toFixed(1)}% |\n`;
            }

            const body = `## Experiment Results\n\n${table}\n\n*Full results on [wandb](https://wandb.ai)*`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
