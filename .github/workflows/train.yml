name: Training Pipeline

on:
  workflow_dispatch:
    inputs:
      training_type:
        description: "Training type"
        required: true
        type: choice
        options:
          - cpt
          - sft
          - both
      max_samples:
        description: "Max training samples (for quick runs)"
        required: false
        default: "0"

env:
  MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
  HF_TOKEN: ${{ secrets.HF_TOKEN }}

jobs:
  train:
    runs-on: [self-hosted, gpu]
    timeout-minutes: 720
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e .

      - name: GPU Info
        run: nvidia-smi

      - name: Pull data with DVC
        run: dvc pull

      - name: Sanity Check
        run: |
          if [ "${{ inputs.training_type }}" = "cpt" ] || [ "${{ inputs.training_type }}" = "both" ]; then
            python -m src.model.sanity_check --model Qwen/Qwen3-VL-7B --dataset data/processed/cpt --type cpt
          fi
          if [ "${{ inputs.training_type }}" = "sft" ] || [ "${{ inputs.training_type }}" = "both" ]; then
            python -m src.model.sanity_check --model Qwen/Qwen3-VL-7B --dataset data/processed/sft --type sft
          fi

      - name: Train CPT
        if: inputs.training_type == 'cpt' || inputs.training_type == 'both'
        run: python -m src.model.train_cpt --config configs/cpt_config.yaml

      - name: Train SFT
        if: inputs.training_type == 'sft' || inputs.training_type == 'both'
        run: python -m src.model.train_sft --config configs/sft_config.yaml

      - name: Evaluate
        run: python -m src.evaluation.run_eval --config configs/eval_config.yaml

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: training-outputs
          path: |
            outputs/*/final/
            outputs/eval/

  register-model:
    runs-on: ubuntu-latest
    needs: train
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: training-outputs

      - name: Register model
        run: |
          pip install mlflow
          python -c "
          from src.cicd.model_registry import ModelRegistry, ModelStage
          registry = ModelRegistry()
          # Get latest run ID from MLflow
          import mlflow
          mlflow.set_tracking_uri('${{ secrets.MLFLOW_TRACKING_URI }}')
          runs = mlflow.search_runs(experiment_names=['qwen3-vl-math-sft'], max_results=1)
          if len(runs) > 0:
              run_id = runs.iloc[0]['run_id']
              version = registry.register_model(run_id)
              validation = registry.validate_for_promotion(version)
              if validation['passed']:
                  registry.promote(version, ModelStage.STAGING)
                  print(f'Model v{version} promoted to staging')
          "
