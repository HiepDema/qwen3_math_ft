name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install minimal dependencies
        run: pip install datasets huggingface_hub

      - name: Syntax check all scripts
        run: |
          python -c "
          import ast, sys
          from pathlib import Path

          scripts = list(Path('scripts').glob('*.py'))
          errors = []
          for f in scripts:
              try:
                  ast.parse(f.read_text())
              except SyntaxError as e:
                  errors.append(f'{f}: {e}')
          if errors:
              for e in errors:
                  print(f'FAIL: {e}')
              sys.exit(1)
          print(f'All {len(scripts)} scripts passed syntax check')
          "

      - name: Validate reward functions
        run: |
          python -c "
          import re

          # Test reward logic without importing torch/unsloth
          def extract_number(text):
              match = re.search(r'Answer:\s*([+-]?\d+\.?\d*/?\.?\d*)', text)
              if match:
                  val = match.group(1).strip()
                  try:
                      if '/' in val:
                          parts = val.split('/')
                          return float(parts[0]) / float(parts[1])
                      return float(val)
                  except (ValueError, ZeroDivisionError):
                      return None
              numbers = re.findall(r'[+-]?\d+\.?\d*/?\.?\d*', text)
              if numbers:
                  try:
                      return float(numbers[-1])
                  except ValueError:
                      return None
              return None

          # Test extract_number
          assert extract_number('Answer: 42') == 42.0
          assert extract_number('Answer: 3/4') == 0.75
          assert extract_number('The result is 15') == 15.0
          assert extract_number('No number here') is None

          # Test correctness logic
          pred = extract_number('Answer: 42')
          assert abs(pred - 42.0) < 1e-6

          pred = extract_number('Answer: 43')
          assert abs(pred - 42.0) > 1e-6

          print('All reward function tests passed!')
          "

      - name: Validate data split reproducibility
        run: |
          python -c "
          from datasets import load_dataset

          dataset = load_dataset('DataMuncher-Labs/LSReasoning-15000', split='train')
          split = dataset.train_test_split(test_size=0.2, seed=42)

          assert len(split['train']) == 12000, f'Expected 12000 train, got {len(split[\"train\"])}'
          assert len(split['test']) == 3000, f'Expected 3000 test, got {len(split[\"test\"])}'

          # Check first sample is deterministic
          first = split['train'][0]
          assert 'question' in first
          assert 'answer' in first
          assert 'how_to_solve' in first

          print(f'Data split OK: train={len(split[\"train\"])}, test={len(split[\"test\"])}')
          "
