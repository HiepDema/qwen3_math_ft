name: Linear Equation Fine-tuning CI

on:
  push:
    branches: [main, develop]
    paths:
      - "scripts/**"
      - "tests/test_linear_eq.py"
      - "configs/cpt_linear_eq.yaml"
      - "configs/sft_linear_eq.yaml"
      - "data/raw/**"
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"

jobs:
  # Job 1: Lint & Format Check
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install ruff
        run: pip install ruff

      - name: Lint scripts
        run: ruff check scripts/ tests/test_linear_eq.py

      - name: Format check
        run: ruff format --check scripts/ tests/test_linear_eq.py

  # Job 2: Unit Tests
  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-test-${{ hashFiles('requirements_finetune.txt') }}

      - name: Install test dependencies
        run: |
          pip install pytest pytest-cov
          pip install datasets

      - name: Run unit tests
        run: pytest tests/test_linear_eq.py -v --tb=short

  # Job 3: Data Generation Validation
  data-validation:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install datasets

      - name: Generate data (local mode)
        run: python scripts/generate_data.py --api local --num-cpt 20 --num-sft 20

      - name: Validate CPT data format
        run: |
          python -c "
          import json
          count = 0
          with open('data/raw/cpt_linear_equations.jsonl', 'r') as f:
              for line in f:
                  item = json.loads(line)
                  assert 'text' in item, 'Missing text field'
                  assert len(item['text']) > 10, 'Text too short'
                  count += 1
          assert count >= 20, f'Expected >= 20 CPT samples, got {count}'
          print(f'CPT data OK: {count} samples')
          "

      - name: Validate SFT data format
        run: |
          python -c "
          import json
          count = 0
          with open('data/raw/sft_linear_equations.jsonl', 'r') as f:
              for line in f:
                  item = json.loads(line)
                  assert 'instruction' in item, 'Missing instruction'
                  assert 'output' in item, 'Missing output'
                  assert 'Giải phương trình:' in item['instruction'], 'Wrong instruction format'
                  assert 'Đáp án:' in item['output'], 'Missing Đáp án in output'
                  assert 'Ta có:' in item['output'], 'Missing Ta có: in output'
                  count += 1
          assert count >= 20, f'Expected >= 20 SFT samples, got {count}'
          print(f'SFT data OK: {count} samples')
          "

      - name: Validate answer correctness
        run: |
          python -c "
          import json, re
          errors = 0
          with open('data/raw/sft_linear_equations.jsonl', 'r') as f:
              for line in f:
                  item = json.loads(line)
                  # Extract equation: ax + b = c or ax - b = c
                  instruction = item['instruction']
                  output = item['output']
                  # Check that Đáp án matches last x = ... in steps
                  answers = re.findall(r'x\s*=\s*([^\n]+)', output)
                  if len(answers) >= 2:
                      step_answer = answers[-2].strip() if 'Đáp án' in output.split(answers[-1])[0] else answers[-1].strip()
                      dap_an = re.search(r'Đáp án[:\s]*x\s*=\s*(.+)', output)
                      if dap_an:
                          final = dap_an.group(1).strip()
                          # The final answer should appear in the steps
                          if final not in output.replace('Đáp án:', ''):
                              errors += 1
          print(f'Answer consistency check: {errors} errors')
          assert errors == 0, f'{errors} samples have inconsistent answers'
          "

  # Job 4: Config Validation
  config-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Validate configs
        run: |
          python -c "
          import yaml

          # Check CPT config
          with open('configs/cpt_linear_eq.yaml') as f:
              cpt = yaml.safe_load(f)
          assert cpt['model']['name'] == 'Qwen/Qwen3-0.6B'
          assert cpt['lora']['r'] > 0
          assert cpt['lora']['lora_alpha'] > 0
          assert cpt['training']['learning_rate'] > 0
          assert cpt['training']['num_train_epochs'] > 0
          print('CPT config OK')

          # Check SFT config
          with open('configs/sft_linear_eq.yaml') as f:
              sft = yaml.safe_load(f)
          assert sft['model']['name'] == 'Qwen/Qwen3-0.6B'
          assert sft['lora']['r'] > 0
          assert sft['training']['learning_rate'] > 0
          assert sft['training']['learning_rate'] <= sft['training']['learning_rate']
          assert sft['dataset']['system_prompt'] is not None
          print('SFT config OK')

          print('All configs validated!')
          "
