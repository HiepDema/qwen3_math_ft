name: Linear Equation Training & Evaluation

on:
  workflow_dispatch:
    inputs:
      num_cpt_samples:
        description: "Number of CPT samples"
        default: "150"
        type: string
      num_sft_samples:
        description: "Number of SFT samples"
        default: "150"
        type: string
      cpt_epochs:
        description: "CPT training epochs"
        default: "3"
        type: string
      sft_epochs:
        description: "SFT training epochs"
        default: "5"
        type: string
      eval_threshold:
        description: "Minimum Exact Match score to pass (0-100)"
        default: "70"
        type: string

jobs:
  train-and-evaluate:
    runs-on: ubuntu-latest
    # Requires GPU runner for actual training
    # For self-hosted GPU runner, change to: runs-on: [self-hosted, gpu]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements_finetune.txt

      - name: Generate training data
        run: |
          python scripts/generate_data.py \
            --api local \
            --num-cpt ${{ inputs.num_cpt_samples }} \
            --num-sft ${{ inputs.num_sft_samples }}

      - name: Run CPT training
        run: |
          python scripts/train_cpt_unsloth.py \
            --epochs ${{ inputs.cpt_epochs }} \
            --lora-r 8 \
            --lora-alpha 16

      - name: Run SFT training
        run: |
          python scripts/train_sft_unsloth.py \
            --cpt-path outputs/cpt_linear_eq/final \
            --epochs ${{ inputs.sft_epochs }} \
            --lora-r 8 \
            --lora-alpha 16

      - name: Evaluate model
        id: eval
        run: |
          python scripts/evaluate.py \
            --model-path outputs/sft_linear_eq/final \
            --num-tests 50 \
            --verbose | tee eval_report.txt

      - name: Check evaluation threshold
        run: |
          python -c "
          import re
          with open('eval_report.txt') as f:
              content = f.read()
          match = re.search(r'Exact Match\s+(\d+\.\d+)%', content)
          if match:
              score = float(match.group(1))
              threshold = ${{ inputs.eval_threshold }}
              print(f'Exact Match: {score}% (threshold: {threshold}%)')
              if score < threshold:
                  raise SystemExit(f'FAILED: {score}% < {threshold}%')
              print('PASSED!')
          else:
              raise SystemExit('Could not parse Exact Match score')
          "

      - name: Upload model artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: sft-model-linear-eq
          path: outputs/sft_linear_eq/final/
          retention-days: 7

      - name: Upload eval report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-report
          path: eval_report.txt
